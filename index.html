<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sergio & Alizon</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:black;
      color:white;
      overflow-x:hidden;
    }

    .hero{
      height:100vh;
      background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1974&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      position:relative;
    }

    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
    }

    .content{
      position:relative;
      z-index:2;
      animation:fadeIn 2s ease;
    }

    h1{
      font-size:70px;
      margin-bottom:20px;
    }

    p{
      font-size:22px;
      margin-bottom:30px;
    }

    button{
      padding:15px 35px;
      border:none;
      border-radius:50px;
      background:#c8a96b;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){

      h1{
        font-size:42px;
      }

      p{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <section class="hero">

    <div class="overlay"></div>

    <div class="content">

      <h1>Sergio & Alizon</h1>

      <p>Nuestra boda</p>

      <button onclick="sendMessage()">
        Confirmar
      </button>

    </div>

  </section>

  <script>

    function sendMessage(){

      let message =
      "Hola, confirmo mi asistencia a la boda 💍";

      let phone = "521234567890";

      let url =
      `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

      window.open(url, "_blank");

    }

  </script>

</body>
</html>
