<!-- HISTORIA -->

<section class="section" id="historia">

  <h2>
    Nuestra historia
  </h2>

  <p class="section-text">
    ¡Esperamos que puedas celebrar este día con nosotros!
  </p>

  <div class="story-slider">

    <img src="images/historia/photo1.jpg" class="story-slide active">

    <img src="images/historia/photo2.jpg" class="story-slide">

    <img src="images/historia/photo3.jpg" class="story-slide">

    <img src="images/historia/photo4.jpg" class="story-slide">

    <img src="images/historia/photo5.jpg" class="story-slide">

    <img src="images/historia/photo6.jpg" class="story-slide">

    <button class="arrow left-arrow" onclick="prevStorySlide()">
      ❮
    </button>

    <button class="arrow right-arrow" onclick="nextStorySlide()">
      ❯
    </button>

  </div>

</section>
